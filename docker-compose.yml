services:
  platform:
    image: php:8.3-cli
    working_dir: /var/www/apps/platform
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: omnibridge
      DB_USERNAME: omnibridge
      DB_PASSWORD: omnibridge
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    command: php -S 0.0.0.0:8000 -t public

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omnibridge
      POSTGRES_USER: omnibridge
      POSTGRES_PASSWORD: omnibridge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

